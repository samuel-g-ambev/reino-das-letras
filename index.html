<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Reino das Letras ✨</title>
  <meta name="description" content="Aprenda a ler brincando no Reino das Letras!">
  <meta name="theme-color" content="#8B5CF6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Reino das Letras">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
  <style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --pink:#FF6B9D;--pink-lt:#FFE4F0;
  --purple:#8B5CF6;--purple-lt:#EDE9FE;
  --gold:#F59E0B;--gold-lt:#FEF3C7;
  --green:#10B981;--red:#EF4444;
  --blue:#3B82F6;--teal:#14B8A6;
  --bg:#FFF0F9;--card:#fff;--border:#F3E8FF;
  --text:#1F2937;--muted:#9CA3AF;
}
body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;overflow-x:hidden}
#app{max-width:420px;margin:0 auto;min-height:100vh;position:relative;background:var(--bg)}
.screen{display:none;min-height:100vh;flex-direction:column}
.screen.active{display:flex}

/* ── TOP BAR ── */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;background:#fff;border-bottom:2px solid var(--border);
  position:sticky;top:0;z-index:30;
}
.tb-item{display:flex;align-items:center;gap:5px;font-weight:800;font-size:.95rem}
.tb-streak{color:#F97316}
.tb-hearts{color:#EF4444}
.tb-xp{color:var(--gold)}
.goal-wrap{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1;margin:0 10px}
.goal-label{font-size:.65rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.goal-track{width:100%;height:8px;background:#F3E8FF;border-radius:4px;overflow:hidden}
.goal-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--pink));border-radius:4px;transition:width .5s}

/* ── HERO ── */
.hero{text-align:center;padding:20px 16px 8px;position:relative}
.mascot{font-size:5rem;display:inline-block;cursor:default;user-select:none}
.mascot.happy{animation:bounce .6s}
.mascot.sad{animation:wobble .5s}
@keyframes bounce{0%,100%{transform:scale(1)}30%{transform:scale(1.25) rotate(-5deg)}60%{transform:scale(1.1) rotate(3deg)}}
@keyframes wobble{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}
.hero h1{font-size:1.8rem;font-weight:900;color:var(--purple);margin:6px 0 2px}
.hero-sub{font-size:.85rem;color:var(--muted);font-weight:700}
.xp-pill{
  display:inline-flex;align-items:center;gap:6px;margin-top:8px;
  background:var(--gold-lt);color:#92400E;font-weight:800;font-size:.85rem;
  padding:5px 14px;border-radius:20px;border:2px solid var(--gold);
}

/* ── SKILL PATH ── */
.skill-path{padding:16px 20px 80px;flex:1}
.section-label{font-size:.72rem;font-weight:800;color:var(--purple);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}

/* connector */
.skill-connector{width:3px;height:28px;background:linear-gradient(var(--purple),var(--pink));border-radius:2px;margin:0 auto}
.skill-connector.locked{background:#E5E7EB}

.skill-card{
  display:flex;align-items:center;gap:14px;background:var(--card);
  border-radius:20px;padding:14px 16px;border:2px solid var(--border);
  box-shadow:0 4px 0 var(--border);cursor:pointer;
  transition:transform .12s,box-shadow .12s;
}
.skill-card:hover:not(.locked){transform:translateY(-2px);box-shadow:0 6px 0 var(--border)}
.skill-card:active:not(.locked){transform:translateY(1px);box-shadow:0 2px 0 var(--border)}
.skill-card.locked{opacity:.45;cursor:not-allowed;pointer-events:none}
.skill-card.mastered{border-color:var(--gold);box-shadow:0 4px 0 #D97706;background:linear-gradient(135deg,#FFFBEB,#fff)}

/* align alternating */
.skill-wrap{margin-bottom:0}
.skill-wrap:nth-child(4n+1) .skill-card{margin-left:0;margin-right:0}
.skill-wrap:nth-child(4n+3) .skill-card{margin-left:30px}

.skill-ico{
  width:52px;height:52px;border-radius:14px;
  display:flex;align-items:center;justify-content:center;font-size:1.9rem;flex-shrink:0;
}
.skill-body{flex:1;min-width:0}
.skill-title{font-weight:800;font-size:.95rem;color:var(--text)}
.skill-desc{font-size:.72rem;color:var(--muted);margin-top:1px}
.crowns{display:flex;gap:3px;margin-top:5px}
.crown{width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:.85rem}
.skill-right{display:flex;flex-direction:column;align-items:center;gap:4px;flex-shrink:0}
.skill-btn{
  background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;
  border:none;padding:8px 16px;border-radius:10px;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:.85rem;cursor:pointer;
}
.skill-card.mastered .skill-btn{background:linear-gradient(135deg,var(--gold),#F97316)}
.progress-dots{display:flex;gap:3px}
.dot{width:8px;height:8px;border-radius:50%;background:#E5E7EB}
.dot.done{background:var(--purple)}

/* ── TIP SCREEN ── */
#s-tip{align-items:center;justify-content:center;padding:32px 24px;text-align:center}
.tip-mascot{font-size:5rem;margin-bottom:12px;animation:float 2s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.tip-bubble{
  background:#fff;border-radius:20px;padding:20px;
  border:2px solid var(--border);box-shadow:0 6px 0 var(--border);
  margin-bottom:24px;max-width:320px;
}
.tip-bubble h3{font-size:1.2rem;font-weight:900;color:var(--purple);margin-bottom:8px}
.tip-bubble p{font-size:.95rem;color:var(--text);line-height:1.5}
.tip-start{
  background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;
  border:none;padding:18px 48px;border-radius:18px;
  font-family:'Nunito',sans-serif;font-weight:900;font-size:1.1rem;cursor:pointer;
  box-shadow:0 6px 0 #6D28D9;transition:all .15s;
}
.tip-start:active{transform:translateY(3px);box-shadow:0 3px 0 #6D28D9}
.tip-skip{margin-top:14px;font-size:.85rem;color:var(--muted);cursor:pointer;font-weight:700}
.tip-skip:hover{color:var(--purple)}

/* ── LESSON SCREEN ── */
#s-lesson .topbar{gap:10px}
.back-btn{background:none;border:none;font-size:1.3rem;cursor:pointer;color:var(--muted);padding:4px;line-height:1}
.prog-track{flex:1;height:10px;background:var(--border);border-radius:5px;overflow:hidden}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--purple),var(--pink));border-radius:5px;transition:width .4s}

.ex-body{flex:1;display:flex;flex-direction:column;padding:20px 16px 96px}
.ex-type-pill{
  display:inline-flex;align-items:center;gap:5px;
  background:var(--purple-lt);color:var(--purple);
  font-weight:800;font-size:.75rem;padding:4px 12px;border-radius:20px;
  margin-bottom:10px;align-self:flex-start;
}
.ex-prompt{font-size:1.3rem;font-weight:800;color:var(--text);margin-bottom:18px;line-height:1.3}
.ex-visual{text-align:center;font-size:5.5rem;margin-bottom:16px;animation:pop .35s}
@keyframes pop{0%{transform:scale(.3);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}

/* word with blank */
.word-row{display:flex;align-items:center;justify-content:center;flex-wrap:wrap;gap:4px;margin-bottom:24px}
.w-syl{font-size:2.6rem;font-weight:900;color:var(--purple)}
.w-sep{font-size:1.4rem;color:#D1D5DB;margin:0 2px}
.w-blank{font-size:2.6rem;font-weight:900;color:var(--pink);border-bottom:4px solid var(--pink);min-width:72px;text-align:center;transition:all .3s}
.w-blank.filled{color:var(--green);border-color:var(--green)}

/* sentence box */
.sent-box{
  background:#fff;border-radius:16px;padding:18px;text-align:center;
  font-size:1.2rem;font-weight:700;color:var(--text);line-height:1.8;
  border:2px solid var(--border);margin-bottom:20px;
}
.s-blank{display:inline-block;min-width:90px;border-bottom:3px solid var(--pink);color:var(--pink);font-weight:900;padding:0 4px;transition:all .3s}
.s-blank.filled{color:var(--green);border-color:var(--green)}

/* rhyme display */
.rhyme-word{
  text-align:center;font-size:2.2rem;font-weight:900;color:var(--purple);
  background:var(--purple-lt);border-radius:16px;padding:16px;margin-bottom:20px;
}

/* options */
.opts{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:auto}
.opts.single-col{grid-template-columns:1fr}
.opt{
  background:var(--card);border:3px solid var(--border);border-radius:16px;
  padding:14px 8px;font-family:'Nunito',sans-serif;font-weight:800;
  font-size:1.1rem;color:var(--text);cursor:pointer;text-align:center;
  box-shadow:0 4px 0 var(--border);transition:all .1s;
}
.opt:hover{transform:translateY(-1px);border-color:var(--purple)}
.opt:active:not(:disabled){transform:translateY(2px);box-shadow:0 2px 0 var(--border)}
.opt:disabled{pointer-events:none}
.opt.correct{background:#ECFDF5;border-color:var(--green);color:var(--green);box-shadow:0 4px 0 #059669}
.opt.wrong{background:#FEF2F2;border-color:var(--red);color:var(--red);box-shadow:0 4px 0 #DC2626;animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

/* combo banner */
.combo-banner{
  text-align:center;font-size:.9rem;font-weight:800;
  color:#F97316;margin-bottom:8px;animation:combo-in .3s;
}
@keyframes combo-in{0%{transform:scale(.6) rotate(-5deg);opacity:0}100%{transform:scale(1) rotate(0);opacity:1}}

/* ── FEEDBACK BAR ── */
.fb{
  position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:420px;padding:16px 18px;z-index:50;
  display:flex;align-items:center;justify-content:space-between;
  border-top:3px solid;gap:12px;
}
.fb.ok{background:#ECFDF5;border-color:var(--green);display:flex}
.fb.bad{background:#FEF2F2;border-color:var(--red);display:flex}
.fb.hidden{display:none}
.fb-left{}
.fb-title{font-weight:800;font-size:1rem}
.fb.ok .fb-title{color:var(--green)}
.fb.bad .fb-title{color:var(--red)}
.fb-detail{font-size:.78rem;color:#6B7280;margin-top:2px}
.cont-btn{
  border:none;padding:13px 20px;border-radius:14px;flex-shrink:0;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:.95rem;cursor:pointer;color:#fff;
}
.fb.ok .cont-btn{background:var(--green)}
.fb.bad .cont-btn{background:var(--red)}

/* ── RESULT SCREEN ── */
#s-result{align-items:center;justify-content:center;text-align:center;padding:32px 20px}
.res-mascot{font-size:6rem;margin-bottom:12px;animation:bounce .6s}
.res-title{font-size:2rem;font-weight:900;color:var(--purple);margin-bottom:4px}
.res-sub{font-size:.95rem;color:var(--muted);margin-bottom:8px}
.new-crowns{font-size:2rem;letter-spacing:4px;margin-bottom:24px}
.res-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:320px;margin-bottom:28px}
.stat-card{background:var(--card);border-radius:16px;padding:14px 6px;border:2px solid var(--border)}
.s-ico{font-size:1.5rem}
.s-val{font-size:1.5rem;font-weight:900;color:var(--text)}
.s-lbl{font-size:.65rem;font-weight:700;color:var(--muted);text-transform:uppercase}
.res-btns{display:flex;flex-direction:column;gap:10px;width:100%;max-width:280px}
.btn-home{
  background:linear-gradient(135deg,var(--purple),var(--pink));color:#fff;
  border:none;padding:17px 0;border-radius:16px;
  font-family:'Nunito',sans-serif;font-weight:900;font-size:1.1rem;cursor:pointer;
  box-shadow:0 6px 0 #6D28D9;transition:all .15s;
}
.btn-home:active{transform:translateY(3px);box-shadow:0 3px 0 #6D28D9}
.btn-replay{
  background:var(--card);color:var(--purple);border:2px solid var(--purple);
  padding:14px 0;border-radius:16px;
  font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;cursor:pointer;
}

/* ── SPARKLES ── */
#sparkles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999}
.sp{position:absolute;animation:sp-fly 1s ease-out forwards;pointer-events:none}
@keyframes sp-fly{0%{transform:translateY(0) scale(1) rotate(0);opacity:1}100%{transform:translateY(-140px) scale(0) rotate(180deg);opacity:0}}

/* ── TOAST ── */
.toast{
  position:fixed;top:72px;left:50%;transform:translateX(-50%) translateY(-10px);
  background:var(--card);border-radius:14px;padding:10px 18px;
  box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:200;
  display:flex;align-items:center;gap:10px;border:2px solid var(--gold);
  animation:toast-in .35s ease forwards;pointer-events:none;white-space:nowrap;
}
@keyframes toast-in{0%{opacity:0;transform:translateX(-50%) translateY(-20px)}100%{opacity:1;transform:translateX(-50%) translateY(0)}}
.toast-ico{font-size:1.6rem}
.toast-text{font-weight:800;font-size:.85rem;color:var(--text)}
.toast-sub{font-size:.72rem;color:var(--muted)}

/* achievement badge pulse */
@keyframes badge-pop{0%{transform:scale(0) rotate(-15deg);opacity:0}70%{transform:scale(1.2) rotate(3deg)}100%{transform:scale(1) rotate(0);opacity:1}}
  </style>
</head>
<body>
<div id="app">

<!-- ══════════ HOME ══════════ -->
<div id="s-home" class="screen active">
  <div class="topbar">
    <div class="tb-item tb-streak">🔥<span id="h-streak">1</span></div>
    <div class="goal-wrap">
      <div class="goal-label">Meta do dia</div>
      <div class="goal-track"><div class="goal-fill" id="goal-fill" style="width:0%"></div></div>
    </div>
    <div class="tb-item tb-hearts">❤️<span id="h-hearts">5</span></div>
  </div>

  <div class="hero">
    <div class="mascot" id="home-mascot">👸</div>
    <h1>Reino das Letras</h1>
    <div class="hero-sub">Aprenda a ler brincando!</div>
    <div class="xp-pill">⭐ <span id="h-xp">0</span> XP · Nível <span id="h-level">1</span></div>
  </div>

  <div class="skill-path" id="skill-path">
    <div class="section-label">🗺️ Sua jornada mágica</div>
  </div>
</div>

<!-- ══════════ TIP SCREEN ══════════ -->
<div id="s-tip" class="screen">
  <div class="tip-mascot">👸</div>
  <div class="tip-bubble">
    <h3 id="tip-title">Sílabas Mágicas</h3>
    <p id="tip-body">Vamos completar palavras com as sílabas certas!</p>
  </div>
  <button class="tip-start" onclick="beginLesson()">Começar! ✨</button>
  <div class="tip-skip" onclick="beginLesson()">Pular dica →</div>
</div>

<!-- ══════════ LESSON ══════════ -->
<div id="s-lesson" class="screen">
  <div class="topbar">
    <button class="back-btn" onclick="goHome()">✕</button>
    <div class="prog-track"><div class="prog-fill" id="e-prog" style="width:0%"></div></div>
    <div class="tb-item tb-hearts" id="e-hearts-display">❤️5</div>
  </div>
  <div class="ex-body" id="ex-body">
    <div id="combo-banner" class="combo-banner" style="display:none"></div>
  </div>
</div>

<!-- ══════════ RESULT ══════════ -->
<div id="s-result" class="screen">
  <div class="res-mascot" id="r-mascot">🎉</div>
  <h2 class="res-title" id="r-title">Parabéns!</h2>
  <p class="res-sub" id="r-sub">Lição completa</p>
  <div class="new-crowns" id="r-crowns"></div>
  <div class="res-grid">
    <div class="stat-card"><div class="s-ico">⭐</div><div class="s-val" id="r-xp">+0</div><div class="s-lbl">XP Ganho</div></div>
    <div class="stat-card"><div class="s-ico">✅</div><div class="s-val" id="r-acc">0/0</div><div class="s-lbl">Acertos</div></div>
    <div class="stat-card"><div class="s-ico">🔥</div><div class="s-val" id="r-combo">0</div><div class="s-lbl">Combo Máx</div></div>
  </div>
  <div class="res-btns">
    <button class="btn-home" onclick="goHome()">🏰 Voltar ao Reino</button>
    <button class="btn-replay" onclick="replayLesson()">↺ Jogar de novo</button>
  </div>
</div>

<!-- FEEDBACK -->
<div class="fb hidden" id="fb-bar">
  <div class="fb-left">
    <div class="fb-title" id="fb-title">✅ Correto!</div>
    <div class="fb-detail" id="fb-detail"></div>
  </div>
  <button class="cont-btn" onclick="nextStep()">Continuar →</button>
</div>

<div id="sparkles"></div>
</div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// SKILLS / CONTENT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const SKILLS = [
  {

      {type:'vowel',word:'F_DA',  emoji:'🧚',blank:'A',options:['A','E','I','O','U'],prompt:'Qual vogal falta na palavra?'},
      {type:'vowel',word:'L_ÃO',  emoji:'🦁',blank:'E',options:['A','E','I','O','U'],prompt:'Qual vogal falta na palavra?'},

  },
  {
    title:'Sílabas', emoji:'✨', bg:'#EDE9FE', color:'#6D28D9',

    tip:'Sílabas são os "pedaços" das palavras. BO-LA tem duas sílabas! Bata palma enquanto fala para contar! 👏',

      {type:'syl',emoji:'🦆',parts:['___','TO'],blank:0,answer:'PA',options:['MA','GA','RI','PA'],prompt:'Qual sílaba vem primeiro?'},
      {type:'syl',emoji:'🪑',parts:['ME','___'],blank:1,answer:'SA',options:['LA','SA','RO','LE'],prompt:'Qual sílaba completa a palavra?'},
      {type:'syl',emoji:'🐟',parts:['PEI','___'],blank:1,answer:'XE',options:['XE','RA','SO','MI'],prompt:'Qual sílaba completa a palavra?'},
      {type:'syl',emoji:'🌙',parts:['LU','___'],blank:1,answer:'AR',options:['AR','AN','AL','AT'],prompt:'Qual sílaba completa a palavra?'},
      {type:'syl',emoji:'🌹',parts:['___','SA'],blank:0,answer:'RO',options:['RO','CA','ME','BA'],prompt:'Qual sílaba vem primeiro?'},
    ]

// STATE
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function loadState() {
  const today = new Date().toDateString();
  const raw   = JSON.parse(localStorage.getItem('kra2') || 'null');
  if (!raw) return {
    xp:0, streak:1, hearts:5,
    crowns:new Array(SKILLS.length).fill(0),
    dailyXP:0, lastDate: today, lastStreak: today,
  };
  if (raw.lastDate !== today) { raw.dailyXP = 0; raw.lastDate = today; }
  return raw;
}

const S = loadState();

// session
let CUR = { skill:-1, step:0, correct:0, xpGained:0, combo:0, maxCombo:0, answered:false, gameOver:false };

function save() { localStorage.setItem('kra2', JSON.stringify(S)); }

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// AUDIO
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function beep(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const note = (f,t,d,w='sine') => {
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.type=w; o.frequency.value=f;
      g.gain.setValueAtTime(.25,ctx.currentTime+t);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+t+d);
      o.connect(g);g.connect(ctx.destination);
      o.start(ctx.currentTime+t);o.stop(ctx.currentTime+t+d);
    };
    if(type==='ok')   {note(523,0,.1);note(659,.12,.1);note(784,.24,.2)}
    if(type==='combo'){note(784,0,.08);note(1047,.09,.08);note(1319,.18,.25)}
    if(type==='bad')  {note(200,0,.15,'sawtooth');note(160,.16,.2,'sawtooth')}
    if(type==='win')  {[523,659,784,880,1047].forEach((f,i)=>note(f,i*.11,.22))}
  } catch(_){}
}

// SPARKLES
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function sparkle(n=8) {
  const c = document.getElementById('sparkles');
  const em = ['✨','⭐','💫','🌟','💖','🎀','🌸','🦋'];
  for(let i=0;i<n;i++) setTimeout(()=>{
    const el=document.createElement('div');
    el.className='sp';
    el.textContent=em[Math.floor(Math.random()*em.length)];
    el.style.cssText=`left:${Math.random()*92}%;top:${30+Math.random()*45}%;font-size:${.9+Math.random()*1.2}rem`;
    c.appendChild(el);
    setTimeout(()=>el.remove(),1000);
  },i*80);
}

// TOAST
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function toast(ico,title,sub) {
  document.querySelector('.toast')?.remove();
  const el=document.createElement('div');
  el.className='toast';
  el.innerHTML=`<div class="toast-ico">${ico}</div><div><div class="toast-text">${title}</div>${sub?`<div class="toast-sub">${sub}</div>`:''}`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2800);
}

// HOME
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderHome() {
  const XP_LV=100, lvl=Math.floor(S.xp/XP_LV)+1;
  document.getElementById('h-xp').textContent    = S.xp;
  document.getElementById('h-streak').textContent = S.streak;
  document.getElementById('h-hearts').textContent = S.hearts;
  document.getElementById('h-level').textContent  = lvl;
  document.getElementById('goal-fill').style.width = Math.min(100, S.dailyXP/DAILY_GOAL*100)+'%';

  const path = document.getElementById('skill-path');
  // keep section label, rebuild nodes
  const label = path.querySelector('.section-label');
  path.innerHTML='';
  path.appendChild(label);

  SKILLS.forEach((sk,i)=>{
    const unlocked = i===0 || (S.crowns[i-1]||0) >= 1;
    const crowns   = S.crowns[i] || 0;
    const mastered = crowns >= 5;

    // connector
    if(i>0){
      const conn=document.createElement('div');
      conn.className='skill-connector'+(unlocked?'':' locked');
      path.appendChild(conn);
    }

    const wrap=document.createElement('div');
    wrap.className='skill-wrap';

    const card=document.createElement('div');
    card.className='skill-card'+(unlocked?'':' locked')+(mastered?' mastered':'');
    card.onclick=()=>openSkill(i);

    const crownEmoji = crown => crown>0?'👑':'⬜';
    const crownHTML  = Array.from({length:5},(_,c)=>`<span class="crown">${c<crowns?'👑':'⬜'}</span>`).join('');

    card.innerHTML=`
      <div class="skill-ico" style="background:${sk.bg}">${sk.emoji}</div>
      <div class="skill-body">
        <div class="skill-title">${sk.title}</div>
        <div class="skill-desc">${sk.desc}</div>
        <div class="crowns">${crownHTML}</div>
      </div>
      <div class="skill-right">
        <button class="skill-btn">${!unlocked?'🔒':mastered?'↺':'Jogar'}</button>
      </div>`;

    wrap.appendChild(card);
    path.appendChild(wrap);
  });
}

// OPEN SKILL → TIP SCREEN
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openSkill(idx) {
  const unlocked = idx===0 || (S.crowns[idx-1]||0)>=1;
  if(!unlocked){ toast('🔒','Bloqueado!','Complete a lição anterior primeiro'); return; }

  CUR = { skill:idx, step:0, correct:0, xpGained:0, combo:0, maxCombo:0, answered:false, gameOver:false };

  const sk = SKILLS[idx];
  document.getElementById('tip-title').textContent = sk.title;
  document.getElementById('tip-body').textContent  = sk.tip;
  show('s-tip');
}

function beginLesson() {
  show('s-lesson');
  renderExercise();
}

function replayLesson() {
  CUR.step=0; CUR.correct=0; CUR.xpGained=0; CUR.combo=0; CUR.maxCombo=0; CUR.answered=false; CUR.gameOver=false;
  show('s-lesson');
  renderExercise();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// EXERCISE RENDER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderExercise() {
  const sk    = SKILLS[CUR.skill];
  const ex    = sk.exercises[CUR.step];
  const total = sk.exercises.length;

  document.getElementById('e-prog').style.width = (CUR.step/total*100)+'%';
  document.getElementById('e-hearts-display').textContent = '❤️'+S.hearts;
  document.getElementById('fb-bar').className = 'fb hidden';
  CUR.answered = false;

  const body = document.getElementById('ex-body');

  // combo banner
  const banner = document.getElementById('combo-banner');
  if(CUR.combo>=3){
    banner.style.display='block';
    banner.textContent = `🔥 Combo ×${CUR.combo}! +${CUR.combo>=5?20:CUR.combo>=4?15:10} XP bônus`;
  } else {
    banner.style.display='none';
  }

  let content='';
  const TYPES = {vowel:'🌺 Vogais',syl:'✨ Sílabas',img:'🌸 Palavras',rhyme:'🎵 Rimas',sent:'👸 Frases'};

  if(ex.type==='vowel'){
    const parts = ex.word.split('_');
    content=`
      <div class="ex-type-pill">${TYPES.vowel}</div>
      <div class="ex-prompt">${ex.prompt}</div>
      <div class="ex-visual">${ex.emoji}</div>
      <div class="word-row">
        <span class="w-syl">${parts[0]}</span>
        <span class="w-blank" id="blank-el">_</span>
        <span class="w-syl">${parts[1]}</span>
      </div>
      <div class="opts">${shuffled(ex.options).map(o=>
        `<button class="opt" data-val="${o}" onclick="pick(this,'${o}','${ex.blank}')">${o}</button>`
      ).join('')}</div>`;

  } else if(ex.type==='syl'){
    const wordHTML=ex.parts.map((p,i)=>
      i===ex.blank
        ? `<span class="w-blank" id="blank-el">___</span>`
        : `<span class="w-syl">${p}</span>`
    ).join(`<span class="w-sep">·</span>`);
    content=`
      <div class="ex-type-pill">${TYPES.syl}</div>
      <div class="ex-prompt">${ex.prompt}</div>
      <div class="ex-visual">${ex.emoji}</div>
      <div class="word-row">${wordHTML}</div>
      <div class="opts">${shuffled(ex.options).map(o=>
        `<button class="opt" data-val="${o}" onclick="pick(this,'${o}','${ex.answer}')">${o}</button>`
      ).join('')}</div>`;

  } else if(ex.type==='img'){
    content=`
      <div class="ex-type-pill">${TYPES.img}</div>
      <div class="ex-prompt">${ex.prompt}</div>
      <div class="ex-visual">${ex.emoji}</div>
      <div class="opts">${shuffled(ex.options).map(o=>
        `<button class="opt" data-val="${o}" onclick="pick(this,'${o}','${ex.answer}')">${o}</button>`
      ).join('')}</div>`;

  } else if(ex.type==='rhyme'){
    const esc=ex.answer.replace(/'/g,"\\'");
    content=`
      <div class="ex-type-pill">${TYPES.rhyme}</div>
      <div class="ex-prompt">${ex.prompt}:</div>
      <div class="rhyme-word">${ex.emoji} ${ex.word}</div>
      <div class="opts">${shuffled(ex.options).map(o=>
        `<button class="opt" data-val="${o}" onclick="pick(this,'${o}','${esc}')">${o}</button>`
      ).join('')}</div>`;

  } else { // sent
    const disp=ex.sentence.replace('___','<span class="s-blank" id="blank-el">___</span>');
    content=`
      <div class="ex-type-pill">${TYPES.sent}</div>
      <div class="ex-prompt">Complete a frase:</div>
      <div class="ex-visual" style="font-size:3.5rem">${ex.hint}</div>
      <div class="sent-box">${disp}</div>
      <div class="opts">${shuffled(ex.options).map(o=>
        `<button class="opt" data-val="${o}" onclick="pick(this,'${o}','${ex.answer}')">${o}</button>`
      ).join('')}</div>`;
  }

  // keep combo banner, inject content after it
  body.innerHTML='<div id="combo-banner" class="combo-banner" style="display:none"></div>'+content;

  // re-attach combo
  const nb = document.getElementById('combo-banner');
  if(CUR.combo>=3){
    nb.style.display='block';
    const bonus = CUR.combo>=5?20:CUR.combo>=4?15:10;
    nb.textContent=`🔥 Combo ×${CUR.combo}! +${bonus} XP bônus`;
  }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ANSWER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function pick(btn, chosen, correct) {
  if(CUR.answered||CUR.gameOver) return;
  CUR.answered=true;
  document.querySelectorAll('.opt').forEach(b=>b.disabled=true);

  const right = chosen===correct;

  if(right){
    btn.classList.add('correct');
    const blank = document.getElementById('blank-el');
    if(blank){ blank.textContent=chosen; blank.classList.add('filled'); }

    CUR.combo++;
    CUR.maxCombo=Math.max(CUR.maxCombo,CUR.combo);
    CUR.correct++;

    let xp=10;
    if(CUR.combo===3){ xp+=10; beep('combo'); sparkle(6); }
    else if(CUR.combo===5){ xp+=20; beep('combo'); sparkle(12); }
    else if(CUR.combo>5){ xp+=20; sparkle(5); }
    else { beep('ok'); sparkle(4); }

    S.xp += xp; S.dailyXP += xp; CUR.xpGained += xp;

    const msgs=['✅ Incrível!','✅ Perfeito!','✅ Muito bem!','✅ Arrasou!'];
    const subs=['Continue assim, princesa! 🌟','Você é demais! 💖','Parabéns! ✨','Mandou bem! 👏'];
    const i=Math.floor(Math.random()*msgs.length);
    setFB(true, msgs[i], CUR.combo>=3?`🔥 Combo ×${CUR.combo}!`:subs[i]);

    // mascot happy
    const m=document.getElementById('home-mascot');
    if(m){m.classList.remove('happy','sad');void m.offsetWidth;m.classList.add('happy');}

  } else {
    btn.classList.add('wrong');
    document.querySelectorAll('.opt').forEach(b=>{ if(b.dataset.val===correct) b.classList.add('correct'); });
    CUR.combo=0;
    S.hearts=Math.max(0,S.hearts-1);
    document.getElementById('e-hearts-display').textContent='❤️'+S.hearts;
    beep('bad');
    setFB(false,'💔 Quase lá!',`A resposta certa é: ${correct}`);
    if(S.hearts===0){ CUR.gameOver=true; document.querySelector('#fb-bar .cont-btn').textContent='Ver resultado →'; }
  }
  save();
}

function setFB(ok,title,detail){
  const bar=document.getElementById('fb-bar');
  bar.className='fb '+(ok?'ok':'bad');
  document.getElementById('fb-title').textContent=title;
  document.getElementById('fb-detail').textContent=detail;
}

function nextStep(){
  if(CUR.gameOver){ endLesson(); return; }
  CUR.step++;
  if(CUR.step>=SKILLS[CUR.skill].exercises.length) endLesson();
  else renderExercise();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// END LESSON
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function endLesson(){
  const total = SKILLS[CUR.skill].exercises.length;
  const pct   = CUR.correct/total;
  const newCrowns = pct>=.9?5:pct>=.75?4:pct>=.6?3:pct>=.4?2:pct>=.25?1:0;
  const prevCrowns = S.crowns[CUR.skill]||0;
  if(newCrowns>prevCrowns) S.crowns[CUR.skill]=newCrowns;

  // streak update
  const today=new Date().toDateString();
  if(S.lastStreak!==today){ S.streak++; S.lastStreak=today; }

  // daily goal celebration
  if(S.dailyXP>=DAILY_GOAL && (S.dailyXP-CUR.xpGained)<DAILY_GOAL){
    setTimeout(()=>toast('🎯','Meta do dia!','Você completou sua meta de hoje! 🔥'),500);
  }

  save();

  const won=newCrowns>=1;
  document.getElementById('r-mascot').textContent = won?'🎉':'💪';
  document.getElementById('r-title').textContent  = won?'Parabéns!':'Continue tentando!';
  document.getElementById('r-sub').textContent    = won
    ? `"${SKILLS[CUR.skill].title}" — ${pct>=.9?'Perfeito! 🌟':pct>=.6?'Muito bem! ✨':'Bem feito!'}`
    : 'Repita a lição para ganhar coroas!';
  document.getElementById('r-crowns').textContent = newCrowns>0
    ? '👑'.repeat(newCrowns)+(newCrowns<5?'⬜'.repeat(5-newCrowns):'')
    : '';
  document.getElementById('r-xp').textContent    = '+'+CUR.xpGained;
  document.getElementById('r-acc').textContent   = `${CUR.correct}/${total}`;
  document.getElementById('r-combo').textContent = CUR.maxCombo;

  beep('win');
  show('s-result');
  if(won){ setTimeout(()=>sparkle(12),300); setTimeout(()=>sparkle(8),800); }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// UTILS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function show(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function goHome(){ show('s-home'); renderHome(); }
function shuffled(a){ const r=[...a]; for(let i=r.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[r[i],r[j]]=[r[j],r[i]];} return r; }

// INIT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
renderHome();
</script>
